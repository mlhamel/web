<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ config.title }}{% endblock %}</title>
    <meta name="description" content="{{ config.description }}">
    <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ get_url(path='/') }}" class="logo">{{ config.title }}</a>
            <ul>
                <li><a href="{{ get_url(path='/') }}">Home</a></li>
                <li><a href="{{ get_url(path='/about') }}">About</a></li>
                <li><a href="{{ get_url(path='/blog') }}">Blog</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 {{ config.extra.author }}. Built with <a href="https://www.getzola.org/">Zola</a>.</p>
    </footer>
</body>
</html>
