# The URL the site will be built for
base_url = "https://mlhamel.github.io/web"

# Theme
theme = "radion"

[[taxonomies]]
name = "tags"

# The site title and description
title = "Mathieu Leduc-Hamel"
description = "Personal website of Mathieu Leduc-Hamel, Software Engineer"

# The default language
default_language = "en"

# Whether to generate a feed file
generate_feeds = true
feed_filenames = ["atom.xml"]

[markdown]
# Whether to do syntax highlighting
highlight_code = true
highlight_theme = "base16-ocean-dark"

[extra]
# Put your custom variables here
author = "Mathieu Leduc-Hamel"
github = "https://github.com/mlhamel"

# Radion theme configuration
radion_menu = [
    {url = "$BASE_URL/", name = "Home"},
    {url = "$BASE_URL/about", name = "About"},
    {url = "$BASE_URL/blog", name = "Blog"},
]
radion_title = "Mathieu Leduc-Hamel"

# Theme settings
favicon = true
codeblock = true
enable_search = false
comments = false
